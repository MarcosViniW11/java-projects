<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Serviços</h1></header>
    <main>
        <section id="form">
            <h2>Cadastrar Um Serviço</h2><br>
            <form id="form-cadastro">
                <label for="nomeServicoId">Nome Do Serviço</label>
                <input type="text" name="" id="nomeServicoId"><br><br>

                <label for="duraçãoMinutosId">Duração do serviço em Minutos:</label>
                <input type="number" name="" id="duraçãoMinutosId"><br><br>

                <label for="preçoId">Preço do Serviço</label>
                <input type="number" name="" id="preçoId" step="0.01"><br><br>

                <button type="submit" id="botaoCadastrar">Cadastrar Serviço</button>
            </form>
        </section><br>

        <section id="ListaServiços"></section><br>

        <section id="linkMenu">
            <a href="../MenuPrincipal/index.html">Voltar para o Menu Principal</a>
        </section>

        

        <script src="script.js"></script>
    </main>
    <footer>
        <p>Feito Por Marcos Vinícius</p>
    </footer>
    
</body>
</html>
