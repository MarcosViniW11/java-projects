<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h2>Cadastro</h2>
    </header>
    <main>
        <h2>Cadastre-se</h2>
        <form id="formCadastro">
            <label for="emailId">Email: </label>
            <input type="email" name="" id="emailId" required> <br><br>

            <label for="senhaId">Senha: </label>
            <input type="password" name="" id="senhaId" required> <br><br>

            <button type="submit" id="botaoCadastrar">Cadastrar</button>
        </form><br>

        <section>
            <a href="../Login/Login.html">Fazer Login</a>
        </section>

        <script src="cadastro.js"></script>
    </main>
    <footer>
        <p>Feito Por Marcos Rocha</p>
    </footer>
    
</body>
</html>
