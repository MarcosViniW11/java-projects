<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h2>Login</h2>
    </header>
    <main>
        <h2>Fazer Login</h2>
        <form id="formLogin">
            <label for="emailId">Email: </label>
            <input type="email" name="" id="emailId" required> <br><br>

            <label for="senhaId">Senha: </label>
            <input type="password" name="" id="senhaId" required> <br><br>

            <button type="submit">Logar</button>
        </form><br>

        <section>
            <a href="../Cadastro/cadastro.html">Cadastrar</a>
        </section>

        <script src="login.js"></script>
    </main>
    <footer>
        <p>Feito Por Marcos Rocha</p>
    </footer>
    
</body>
</html>
