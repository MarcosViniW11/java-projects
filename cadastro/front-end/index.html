<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de clientes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Cadastro</h1>

    <form id="form-cadastro">
        <label for="nomeId">Nome:</label>
        <input type="text" id="nomeId">

        <label for="emailId">Email:</label>
        <input type="text" id="emailId">

        <label for="cpfId">Cpf:</label>
        <input type="text" id="cpfId">

        <label for="telefoneId">Telefone:</label>
        <input type="text" id="telefoneId">

        <label for="enderecoId">Endereço:</label>
        <input type="text" id="enderecoId">

        <button type="submit">Cadastrar</button>

    </form>

    <h2>Lista de Clientes:</h2>

    <div id="listaCliente"></div>



    <script src="script.js"></script>
</body>

</html>
