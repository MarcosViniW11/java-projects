<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TreinoApp - Cadastro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f0f2f5; }
        .container { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1c1e21; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #4b4f56; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-check { background-color: #6c757d; color: white; border: none; padding: 8px; cursor: pointer; border-radius: 6px; width: 100%; margin-bottom: 10px; }
        .btn-save { background-color: #008cff; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 6px; width: 100%; font-weight: bold; font-size: 16px; }
        .message { margin-top: 15px; padding: 10px; border-radius: 6px; display: none; text-align: center; }
        .success { background-color: #d4edda; color: #155724; display: block; }
        .error { background-color: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Novo Usuário</h2>
        
        <div class="form-group">
            <label>E-mail:</label>
            <input type="email" id="email" placeholder="exemplo@email.com">
        </div>
        <button class="btn-check" onclick="verificarEmail()">Verificar Disponibilidade</button>

        <div class="form-group">
            <label>Peso (kg):</label>
            <input type="number" id="peso" step="0.01">
        </div>

        <div class="form-group">
            <label>Altura (m):</label>
            <input type="number" id="altura" step="0.01">
        </div>

        <button class="btn-save" onclick="cadastrarUsuario()">CADASTRAR</button>
        <div id="msg" class="message"></div>
        
        <p style="text-align: center;"><a href="../perfil/perfil.html">Já tem conta? Ver Perfil</a></p>
    </div>

    <script src="cadastro.js"></script>
</body>
</html>
