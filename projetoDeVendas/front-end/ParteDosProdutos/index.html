<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina dos Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Cadastro de Produtos</h1>
    </header>
    <main>
        <form id="form-Produto">
            <label for="">Nome:</label>
            <input type="text" name="" id="nomeId"><br>

            <label for="">Preço Unitario:</label>
            <input type="number" name="" id="precoId" step="0.01"><br>

            <label for="">Quantidade no Estoque:</label>
            <input type="number" name="" id="quantidadeId"><br>

            <br><button id="botaoCadastrar" type="submit" >Cadastrar Produto</button>
            
        </form>

        <br><br>
        <div id="listaProdutos">Lista de Produtos</div>
        
        <br>
        <br>
        
        <div id="botao">
            <a href="/MenuPrincipal/index.html">Voltar para o Menu Principal</a>
        </div>
        

        <script src="scriptProdutos.js"></script>
    </main>

    

    <footer>
        <p>Feito Por Marcos Rocha</p>
    </footer>
    
</body>
</html>
