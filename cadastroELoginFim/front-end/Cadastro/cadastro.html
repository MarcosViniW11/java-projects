<!DOCTYPE html>

<head>

    <title>Cadastro</title>
</head>
<body>
    <header><h1>Cadastro</h1></header>
    <main>
        <section id="form">
            <h2>Cadastrar</h2>
            <form id="form-cadastro">
                <label for="emailId">Email</label>
                <input type="email" name="" id="emailId" required><br><br>

                <label for="senhaId">Senha</label>
                <input type="password" name="" id="senhaId" required><br><br>

                <button type="submit" id="botaoCadastrar">Cadatrar</button>
            </form>

            <script src="cadastroScript.js"></script>
        </section>

        <br>
        <section id="link">
            <a href="../Login/login.html">Ir para Pagina de Login</a>
        </section>

    </main>
    <footer>
        <p>Feito Por Marcos Rocha</p>
    </footer>
</body>
