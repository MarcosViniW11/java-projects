<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <header><h1>Login</h1></header>
    <main>
        <section id="form">
            <h2>Fazer Login</h2>
            <form id="form-login">
                <label for="emailId">Email</label>
                <input type="email" name="" id="emailId" required><br><br>

                <label for="senhaId">Senha</label>
                <input type="password" name="" id="senhaId" required><br><br>

                <button type="submit" id="botaoLogar">Cadatrar</button>
            </form>

            <script src="loginScript.js"></script>
        </section>

        <br>
        <section id="link">
            <a href="../Cadastro/cadastro.html">Ir para Pagina de Cadastro</a>
        </section>

    </main>
    <footer>
        <p>Feito Por Marcos Rocha</p>
    </footer>
</body>
</html>
