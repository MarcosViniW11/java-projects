<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Produtos</h1>
    </header>
    <main>
        <h2>Cadastrar Produto</h2>
        <form id="form-produto">
            <label for="nomeProdutoId">Nome Do Produto:</label>
            <input type="text" name="" id="nomeProdutoId">
            <br>
            <label for="qtbEstoqueId">Quantidade em Estoque:</label>
            <input type="number" name="" id="qtbEstoqueId">
            <br>
            <label for="valorUnitarioId">Valor Unitario Do Produto:</label>
            <input type="number" name="" id="valorUnitarioId" step="0.01">
            <br>
            <br>

            <button type="submit" id="botaoCadastrarProdutoId">Cadastrar Produto</button>
            <br>
        </form><br>

        <h2>Lista de Produtos</h2><br>
            
        <section id="lista-produtos"></section>
        <br>

        <section id="link">
            <a href="../MenuPrincipal/index.html">Voltar Para o Menu Principal</a>
        </section>
        

        <script src="script.js"></script>
    </main>
    <footer>
        <p>Feito Por Marcos Rocha</p>
    </footer>
</body>
</html>
