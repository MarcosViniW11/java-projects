<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Clientes</h1></header>
    <main>
        <section id="form">
            <h2>Cadastrar Um Cliente</h2><br>
            <form id="form-cliente">
                <label for="nomeId">Nome:</label>
                <input type="text" name="" id="nomeId"><br><br>

                <label for="telefoneId">Telefone:</label>
                <input type="text" name="" id="telefoneId"><br><br>

                <label for="emailId">Email:</label>
                <input type="text" name="" id="emailId"><br><br>

                <label for="senhaId">Senha</label>
                <input type="password" name="" id="senhaId"><br><br>

                <button type="submit" id="botaoCadastrar">Cadastrar</button>
            </form>
        </section>

        <h3>Lista de Clientes</h3>
        <section id="ListaClientes"></section><br>

        <section id="voltar">
            <a href="../MenuPrincipal/index.html">Voltar Para o Menu</a>
        </section>

        

        <script src="script.js"></script>

    </main>
    <footer>
        <p>Feito Por Marcos Rocha</p>
    </footer>
    
</body>
</html>
