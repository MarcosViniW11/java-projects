<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Login</h1></header>
    <main>
        <section>
            <h2>Faça login para prosseguir</h2><br>
            <form id="form-login">
                <label for="emailId">Email:</label>
                <input type="text" name="" id="emailId"><br><br>

                <label for="senhaId">Senha:</label>
                <input type="password" name="" id="senhaId"><br><br>

                <button type="submit">Login</button>
            </form>

            <script src="script.js"></script>
        </section>
    </main>
    <footer>
        <p>Feito Por Marcos Rocha</p>
    </footer>
    
</body>
</html>
